exchange: binance
symbols: [BTC/USDT, ETH/USDT]
timeframe: 15m
paper_capital: 10000.0
fee_pct: 0.001
slippage_pct: 0.0005
data_dir: data
mode: paper                       # paper (simulated) | shadow (real read-only) | live (real orders)
# Live also requires env LIVE_TRADING_ARMED=yes (second switch); touch data/HALT to stop instantly.
# exchange_api_key_env: EXCHANGE_API_KEY      # env var holding a READ-ONLY exchange key (shadow)
# exchange_secret_env: EXCHANGE_API_SECRET
interval_seconds: 900  # seconds between cron cycles; the dashboard flags STALE past ~2.5x this
risk:
  max_position_pct: 0.25
  stop_loss_pct: 0.05
  # leverage: 1.0              # >1 enables isolated-margin leverage (opt-in)
  # maintenance_margin_pct: 0.005   # margin floor that triggers liquidation
  # funding_rate: 0.0            # per-interval perp funding (opt-in); + => longs pay shorts
  # funding_interval_hours: 8.0  # how often funding is charged
llm:
  base_url: https://ai.myhermes.cloud/v1
  api_key_env: MYHERMES_API_KEY
  model: z-ai/glm-5.2
  json_mode: true
strategy: hybrid
rules:
  rsi_buy: 30
  rsi_sell: 70
  buy_size: 0.5
sentiment:
  enabled: true
  weights: {fear_greed: 1.0, cryptopanic: 1.0, reddit: 1.0, x_twitter: 1.0}
  cache_ttl: {fear_greed: 86400, cryptopanic: 3600, reddit: 3600, x_twitter: 3600}
  buy_min: -0.2
  sell_max: -0.5
  http_timeout: 6
